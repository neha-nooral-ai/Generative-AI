{% extends "base.html" %}

{% block content %}
<div class="form-container">
    <h2>Generate Your Custom Nutrition Plan</h2>
    <form action="/nutrition-plan" method="POST" class="plan-form">
        <div class="form-group">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="10" max="100" required>
        </div>
        
        <div class="form-group">
            <label for="gender">Gender:</label>
            <select id="gender" name="gender" required>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" name="weight" min="30" max="200" step="0.1" required>
        </div>
        
        <div class="form-group">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" name="height" min="100" max="250" required>
        </div>
        
        <div class="form-group">
            <label for="activity_level">Activity Level:</label>
            <select id="activity_level" name="activity_level" required>
                <option value="sedentary">Sedentary (little or no exercise)</option>
                <option value="light">Lightly Active (light exercise 1-3 days/week)</option>
                <option value="moderate">Moderately Active (moderate exercise 3-5 days/week)</option>
                <option value="very_active">Very Active (hard exercise 6-7 days/week)</option>
                <option value="extra_active">Extra Active (very hard exercise & physical job)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="dietary_preference">Dietary Preference:</label>
            <select id="dietary_preference" name="dietary_preference" required>
                <option value="balanced">Balanced</option>
                <option value="vegetarian">Vegetarian</option>
                <option value="vegan">Vegan</option>
                <option value="keto">Keto</option>
                <option value="paleo">Paleo</option>
                <option value="mediterranean">Mediterranean</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="goal">Nutrition Goal:</label>
            <select id="goal" name="goal" required>
                <option value="weight_loss">Weight Loss</option>
                <option value="muscle_gain">Muscle Gain</option>
                <option value="maintenance">Maintenance</option>
                <option value="improve_health">Improve Overall Health</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="duration">Plan Duration:</label>
            <select id="duration" name="duration" required>
                <option value="1 week">1 Week</option>
                <option value="3 weeks">3 Weeks</option>
                <option value="1 month">1 Month</option>
                <option value="3 months">3 Months</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="meals_per_day">Meals per Day:</label>
            <select id="meals_per_day" name="meals_per_day" required>
                <option value="3">3 Meals</option>
                <option value="4">4 Meals</option>
                <option value="5">5 Meals</option>
                <option value="6">6 Meals</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="allergies">Food Allergies/Intolerances (comma separated):</label>
            <input type="text" id="allergies" name="allergies" placeholder="e.g., peanuts, shellfish, gluten">
        </div>
        
        <button type="submit" class="btn btn-primary">Generate Nutrition Plan</button>
    </form>
</div>
{% endblock %}
